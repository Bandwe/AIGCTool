name: Build AIGCTool

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: AIGCTool-Windows
          - os: macos-latest
            artifact: AIGCTool-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: python build.py

      - name: Create ZIP (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/AIGCTool -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Create ZIP (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ${{ matrix.artifact }}.zip AIGCTool

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}.zip
